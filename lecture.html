<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="images/wine_icon.png">
  <title>Lecture</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Ballet&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script defer src="data.js"></script>

<body>
  <header class="site-header">
    <a class="back-link" href="index.html">← Back</a>
    <h1 id="lecture-title">Lecture</h1>
    <p id="lecture-subtitle" class="subtle"></p>
  </header>

  <main class="container">
    <section class="card">
      <h2>Bottles</h2>
      <div class="shelf">
        <div id="wine-shelf" class="wine-shelf"></div>
      </div>
      <p class="subtle small">Hover a bottle to see Hailee's rating.</p>

    <section class="card">
      <h2>Notes</h2>
      <div id="lecture-notes" class="notes">
        <div id="notes"></div>
      </div>
    </section>
  </main>
